apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
data:
  alerting.yaml: |
    apiVersion: 1

    groups:
      - orgId: 1
        name: CircleGuard Critical Alerts
        folder: CircleGuard
        interval: 1m
        rules:

          - uid: cg-high-5xx-rate
            title: High 5xx Error Rate
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: sum(rate(http_server_requests_seconds_count{job=~"circleguard-.*",status=~"5.."}[5m]))
                  hide: false
                  instant: false
                  range: true
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: A
                  hide: false
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.05
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: B
                  hide: false
                  refId: C
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: High 5xx error rate in CircleGuard
              description: "The aggregate 5xx error rate across all CircleGuard microservices has exceeded 0.05 req/s for 5 consecutive minutes."
            labels:
              severity: critical
            isPaused: false

          - uid: cg-service-down
            title: CircleGuard Service Unreachable
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: min(up{job=~"circleguard-.*"}) by (job)
                  hide: false
                  instant: false
                  range: true
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: A
                  hide: false
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: B
                  hide: false
                  refId: C
                  type: threshold
            noDataState: Alerting
            execErrState: Error
            for: 2m
            annotations:
              summary: CircleGuard service is unreachable
              description: "A CircleGuard microservice has stopped responding to Prometheus scrapes for more than 2 minutes."
            labels:
              severity: critical
            isPaused: false

          - uid: cg-high-jvm-heap
            title: High JVM Heap Usage
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: max(jvm_memory_used_bytes{area="heap",job=~"circleguard-.*"} / jvm_memory_max_bytes{area="heap",job=~"circleguard-.*"}) by (job)
                  hide: false
                  instant: false
                  range: true
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: A
                  hide: false
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: B
                  hide: false
                  refId: C
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: High JVM heap usage
              description: "JVM heap usage in a CircleGuard service has exceeded 80% for 5 consecutive minutes. Risk of OutOfMemoryError."
            labels:
              severity: warning
            isPaused: false

          - uid: cg-high-4xx-rate
            title: Elevated 4xx Error Rate
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: sum(rate(http_server_requests_seconds_count{job=~"circleguard-.*",status=~"4.."}[5m])) by (job)
                  hide: false
                  instant: false
                  range: true
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: A
                  hide: false
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 0.5
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                  expression: B
                  hide: false
                  refId: C
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: Elevated 4xx error rate
              description: "A CircleGuard service is returning more than 0.5 req/s of 4xx errors for 5 consecutive minutes. Possible bad requests or auth issues."
            labels:
              severity: warning
            isPaused: false

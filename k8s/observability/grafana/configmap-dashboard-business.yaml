apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-business
data:
  business-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"circleguard-.*\", uri=\"/api/v1/gate/validate\"}[5m]))",
              "legendFormat": "QR Validations/s",
              "refId": "A"
            }
          ],
          "title": "QR Validations Rate (Campus Entries)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 5,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"circleguard-.*\", uri=\"/api/v1/identities/map\"}[5m]))",
              "legendFormat": "Identity Mappings/s",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"circleguard-.*\", uri=\"/api/v1/identities/visitor\"}[5m]))",
              "legendFormat": "Visitor Registrations/s",
              "refId": "B"
            }
          ],
          "title": "Identity Operations Rate (Privacy Vault)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "id": 6,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"circleguard-.*\", uri=~\"/api/v1/surveys.*|/api/v1/forms.*\"}[5m]))",
              "legendFormat": "Health Surveys/s",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"circleguard-.*\", uri=~\"/api/v1/promotions.*|/api/v1/status.*\"}[5m]))",
              "legendFormat": "Status Promotions/s",
              "refId": "B"
            }
          ],
          "title": "Health Workflow Rate (Surveys & Promotions)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1}},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 1,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "sum(rate({namespace=~\"dev|stage|master\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Log Rate per Pod",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 1}},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 2,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single"}},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "sum(count_over_time({namespace=~\"dev|stage|master\"} |= \"ERROR\" [5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Error Log Count per Pod",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 16},
          "id": 3,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{namespace=~\"dev|stage|master\"} |= \"ERROR\"",
              "refId": "A"
            }
          ],
          "title": "Recent Error Logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["circleguard", "business"],
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "CircleGuard - Business Dashboard",
      "uid": "circleguard-business",
      "version": 2
    }

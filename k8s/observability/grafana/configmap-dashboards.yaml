apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: CircleGuard
        orgId: 1
        folder: CircleGuard
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

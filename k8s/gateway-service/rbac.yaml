metadata:
  name: gateway-service-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-service-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: circleguard-service-role
subjects:
  - kind: ServiceAccount
    name: gateway-service-sa

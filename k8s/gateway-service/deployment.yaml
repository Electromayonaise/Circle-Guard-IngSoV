apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  progressDeadlineSeconds: 1800
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      serviceAccountName: gateway-service-sa
      containers:
        - name: gateway-service
          image: circleguarddevacr.azurecr.io/circleguard-gateway:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: circleguard-config
            - secretRef:
                name: circleguard-secrets
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: "$(REDIS_HOST)"
            - name: SPRING_DATA_REDIS_PORT
              value: "$(REDIS_PORT)"
          startupProbe:
            tcpSocket:
              port: 8087
            failureThreshold: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

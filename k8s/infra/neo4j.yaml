apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-neo4j
  template:
    metadata:
      labels:
        app: circleguard-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: circleguard-secrets
                  key: NEO4J_AUTH
          ports:
            - containerPort: 7474
            - containerPort: 7687
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: neo4j-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-neo4j
spec:
  selector:
    app: circleguard-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: circleguard-service-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
    resourceNames: ["circleguard-config"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["circleguard-secrets"]
